name: Calculator CI Pipeline

on:
  push:
    branches:
      - develop
      - feature-*
  pull_request:
    branches:
      - develop
  schedule:
    - cron: '30 11 * * 3,5'   

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test --logger "trx" --results-directory TestResults

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

      - name: Publish MVC App
        run: dotnet publish CalculatorAppMVC/CalculatorAppMVC.csproj -c Release -o output

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build-${{ github.sha }}
          path: output/
