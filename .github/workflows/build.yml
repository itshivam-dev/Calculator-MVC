name: Calculator CI Pipeline

on:
  push:
    branches:
      - develop
      - feature-*
  pull_request:
    branches:
      - develop

  schedule:
    - cron: '30 11 * * 3,5'

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test --logger "trx"

      - name: Publish MVC App
        run: dotnet publish CalculatorAppMVC/CalculatorAppMVC.csproj -c Release -o output

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: '**/*.trx'

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: calculator-build
          path: output/
