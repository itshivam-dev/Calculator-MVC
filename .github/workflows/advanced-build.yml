name: Advanced CI Pipeline

on:
  push:
    branches:
      - develop
      - feature-*
  pull_request:
    branches:
      - develop
  schedule:
    - cron: '30 11 * * 3,5'  

env:
  BUILD_VERSION: ${{ github.ref_name }}-${{ github.sha }}

jobs:
  build-test:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check .NET Version
        run: dotnet --version

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        id: test_step
        continue-on-error: true
        run: |
          dotnet test \
          --logger "trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory TestResults

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ env.BUILD_VERSION }}
          path: TestResults

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.BUILD_VERSION }}
          path: '**/coverage.cobertura.xml'

      - name: Check Test Status
        if: steps.test_step.outcome == 'failure'
        run: echo "Tests failed but build continued"

      - name: Publish MVC App
        if: steps.test_step.outcome == 'success'
        run: dotnet publish CalculatorAppMVC/CalculatorAppMVC.csproj -c Release -o output

      - name: Upload Build Artifact
        if: steps.test_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.BUILD_VERSION }}
          path: output/

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.zoho.in
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Build Failed - ${{ github.repository }}"
          body: |
            Build failed for:
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Check logs here:
            https://github.com/${{ github.repository }}/actions
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
